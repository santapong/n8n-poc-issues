worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # n8n uses websockets for the editor "push" channel.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream n8n_main {
        server n8n-main:5678;
    }

    server {
        listen 80;
        server_name _;

        # PREVENTION: cap upload size at the edge. Anything bigger is rejected
        # with 413 *before* it ever reaches the n8n main node's heap.
        client_max_body_size 25m;

        location / {
            proxy_pass http://n8n_main;
            proxy_http_version 1.1;

            # Websocket upgrade for the editor push channel.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stream the request body straight to n8n instead of buffering
            # it on nginx first — the upload lands in the main node's heap.
            proxy_request_buffering off;
            proxy_buffering         off;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
